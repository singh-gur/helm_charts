      warehouse: s3a://datastore/iceberg
      s3:
        endpoint: https://s3v2.gsingh.io
        region: us-east-1
        pathStyleAccess: true
      credentialsSecret: trino-iceberg-s3

# Apache Polaris - Iceberg REST Catalog
# Deployed in the data-platform namespace alongside Trino.
# Polaris uses PostgreSQL for metadata persistence (relational-jdbc).
# Phase 4 bootstrap runs in mixed auth mode so internal bootstrap credentials
# can seed principals/roles/catalogs; switch back to strict external after init.
# Secrets required in data-platform namespace:
#   - polaris-db-credentials  (keys: username, password, jdbcUrl)   -- created in Phase 1
#   - polaris-oidc-client     (keys: clientId, clientSecret)         -- created in Phase 2
#   - trino-iceberg-s3        (reused for S3 storage credentials)
#   - polaris-token-keys      (keys: public.pem, private.pem)         -- created in Phase 4
polaris:
  enabled: true
  version: "1.3.0-incubating"
  namespace: data-platform
  ingress:
    enabled: true
    host: polaris.gsingh.io
  persistence:
    type: relational-jdbc
    # Secret name holding PostgreSQL connection details (keys: username, password, jdbcUrl)
    secret: polaris-db-credentials
  authentication:
    # Phase 4 bootstrap: use mixed mode to allow internal bootstrapping.
    # After bootstrap, set type=external and tokenService.type=disabled.
    type: mixed
    tokenService:
      type: default
    tokenBroker:
      type: rsa-key-pair
      secret:
        name: polaris-token-keys
        rsaKeyPair:
          publicKey: public.pem
          privateKey: private.pem
  storage:
    s3:
      # Reuse the existing S3 credentials secret from Trino (keys: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY)
      credentialsSecret: trino-iceberg-s3
      awsAccessKeyIdKey: AWS_ACCESS_KEY_ID
      awsSecretAccessKeyKey: AWS_SECRET_ACCESS_KEY
  oidc:
    # Zitadel OIDC server URL (discovery endpoint: <authServerUrl>/.well-known/openid-configuration)
    authServerUrl: "https://auth.gsingh.io"
    # Client ID from the Zitadel 'polaris-server' API application (Phase 2)
    clientId: "364792263672399345"
    # Secret holding the Zitadel client secret (key: clientSecret)
    clientSecretRef:
      name: polaris-oidc-client
      key: clientSecret
    # Keep idClaimPath empty for Zitadel machine tokens where 'sub' is numeric;
    # otherwise Polaris may treat it as principalId and look up by internal DB ID.
    idClaimPath: ""
    # Use Zitadel 'sub' as principal name so Polaris resolves by principal name.
    nameClaimPath: "sub"
    # Path to the roles claim in the Zitadel JWT
    rolesClaimPath: "roles"
    # Regex filter: only include roles that look like Polaris roles (adjust if needed)
    rolesMappings:
      - regex: "^(.+)$"
        replacement: "PRINCIPAL_ROLE:$1"
  features:
    # Supported storage types for catalog entries
    SUPPORTED_CATALOG_STORAGE_TYPES:
      - S3

dagster:
  enabled: true
  version: 1.12.13
  namespace: dagster
  ingress:
    host: dagster.gsingh.io
    ingressClassName: traefik
    annotations: {}
    # Optional: Add Traefik-specific annotations if needed
    # annotations:
    #   traefik.ingress.kubernetes.io/router.entrypoints: websecure
    #   traefik.ingress.kubernetes.io/router.tls: "true"
  postgresql:
    enabled: false
    host: 192.168.2.119
    username: dagster
    database: dagster
    existingSecret: dagster-postgresql-secret
  # User code deployments - supports multiple deployments
  userDeployments:
    enabled: true
    # Global image pull secrets applied to all deployments (can be overridden per deployment)
    imagePullSecrets:
      - regv2-secret
    # List of user code deployments
    deployments:
      - name: "sample-dagster"
        image:
          repository: regv2.gsingh.io/personal/sample-dagster
          tag: latest
          pullPolicy: Always
        # For modern Dagster projects (uv/module-based), use moduleName
        moduleName: sample_dagster
        # For legacy projects (file-based), use codeFile instead
        # codeFile: /apps/sample-dagster/main.py
        # Optional: Override global imagePullSecrets for this deployment
        # imagePullSecrets:
        #   - custom-secret
      # Example: Add more deployments as needed
      # - name: "analytics-pipeline"
      #   image:
      #     repository: regv2.gsingh.io/personal/analytics-dagster
      #     tag: v1.0.0
      #     pullPolicy: IfNotPresent
      #   moduleName: analytics_pipeline

