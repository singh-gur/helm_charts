{{- if .Values.datahub.enabled }}
{{- $datahub := .Values.datahub }}
{{- $datahubIngress := $datahub.ingress | default dict }}
{{- $datahubGlobal := $datahub.global | default dict }}
{{- $datahubGms := index $datahub "datahub-gms" | default dict }}
{{- $datahubFrontend := index $datahub "datahub-frontend" | default dict }}
{{- $datahubActions := index $datahub "acryl-datahub-actions" | default dict }}
{{- $datahubSystemUpdate := $datahub.datahubSystemUpdate | default dict }}
{{- $datahubGmsValues := deepCopy $datahubGms }}
{{- if not (hasKey $datahubGmsValues "enabled") }}
{{- $_ := set $datahubGmsValues "enabled" true }}
{{- end }}
{{- $datahubFrontendValues := deepCopy $datahubFrontend }}
{{- if not (hasKey $datahubFrontendValues "enabled") }}
{{- $_ := set $datahubFrontendValues "enabled" true }}
{{- end }}
{{- $frontendIngress := get $datahubFrontendValues "ingress" | default dict }}
{{- $_ := set $frontendIngress "enabled" true }}
{{- $_ := set $frontendIngress "pathType" "Prefix" }}
{{- if not (hasKey $frontendIngress "hosts") }}
{{- $_ := set $frontendIngress "hosts" (list (dict "host" ($datahubIngress.host | default "datahub.gsingh.io") "paths" (list "/"))) }}
{{- end }}
{{- if not (hasKey $frontendIngress "tls") }}
{{- $_ := set $frontendIngress "tls" (list) }}
{{- end }}
{{- $_ := set $datahubFrontendValues "ingress" $frontendIngress }}
{{- $datahubActionsValues := deepCopy $datahubActions }}
{{- if not (hasKey $datahubActionsValues "enabled") }}
{{- $_ := set $datahubActionsValues "enabled" true }}
{{- end }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  namespace: {{ .Values.argocdNamespace | default "default" }}
  name: datahub
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.datahubproject.io/
    chart: datahub
    targetRevision: {{ $datahub.version | quote }}
    helm:
      values: |
        global:
{{ toYaml $datahubGlobal | indent 10 }}
        datahub-gms:
{{ toYaml $datahubGmsValues | indent 10 }}
        datahub-frontend:
{{ toYaml $datahubFrontendValues | indent 10 }}
        acryl-datahub-actions:
{{ toYaml $datahubActionsValues | indent 10 }}
{{- if $datahubSystemUpdate }}
        datahubSystemUpdate:
{{ toYaml $datahubSystemUpdate | indent 10 }}
{{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ $datahub.namespace | default "data-platform" }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: datahub-gms-secret
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: datahub-frontend-secret
      jsonPointers:
        - /data
{{- end }}
