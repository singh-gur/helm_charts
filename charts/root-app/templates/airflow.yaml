{{- if .Values.airflow.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: {{ .Values.argocdNamespace | default "default" }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://airflow.apache.org
    chart: airflow
    targetRevision: {{ .Values.airflow.version }}
    helm:
      values: |
        airflowVersion: {{ .Values.airflow.airflowVersion | quote }}
        config:
          core:
            hostname_callable: {{ .Values.airflow.hostnameCallable | quote }}
        env:
          - name: AIRFLOW__CORE__HOSTNAME_CALLABLE
            value: {{ .Values.airflow.hostnameCallable | quote }}
{{ with .Values.airflow.dags }}
        dags:
{{ toYaml . | nindent 10 }}
{{ end }}
        # Disable bundled PostgreSQL; use external database via secret
        postgresql:
          enabled: false
        data:
          metadataSecretName: {{ .Values.airflow.metadataSecretName | quote }}
          # brokerUrl secret is not auto-created by helm upgrade/ArgoCD; must reference a pre-created secret
          brokerUrlSecretName: {{ .Values.airflow.brokerUrlSecretName | quote }}
        # Use a pre-created redis password secret (key: password) instead of the chart's
        # auto-generated helm-hook secret, which ArgoCD never creates.
        redis:
          passwordSecretName: {{ .Values.airflow.redisPasswordSecretName | quote }}
        # Explicitly enable the DB migration init job (runs airflow db migrate before pods start)
        migrateDatabaseJob:
          enabled: true
          # useHelmHooks: true (default) annotates the Job as a helm hook, which ArgoCD never fires.
          # Setting false makes it a plain Job that ArgoCD creates and manages directly.
          useHelmHooks: false
          # Increase TTL so the Job pod stays around long enough to inspect logs
          ttlSecondsAfterFinished: 3600
        # images.migrationsWaitTimeout is the correct chart key (not waitForMigrations.waitTimeoutSeconds)
        images:
          migrationsWaitTimeout: 300
        # createUserJob also defaults to useHelmHooks: true — must disable for ArgoCD
        createUserJob:
          useHelmHooks: false
          ttlSecondsAfterFinished: 3600
          # Inject admin password from a Kubernetes Secret via env var
          env:
            - name: AIRFLOW_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.adminUser.existingSecret | quote }}
                  key: password
          # Override args to use $AIRFLOW_ADMIN_PASSWORD instead of a plaintext value
          args:
            - "bash"
            - "-c"
            - |-
              exec \
              airflow users create "$@"
            - "--"
            - "-r"
            - {{ .Values.airflow.adminUser.role | quote }}
            - "-u"
            - {{ .Values.airflow.adminUser.username | quote }}
            - "-e"
            - {{ .Values.airflow.adminUser.email | quote }}
            - "-f"
            - {{ .Values.airflow.adminUser.firstName | quote }}
            - "-l"
            - {{ .Values.airflow.adminUser.lastName | quote }}
            - "-p"
            - "$(AIRFLOW_ADMIN_PASSWORD)"
        fernetKeySecretName: {{ .Values.airflow.fernetKeySecretName | quote }}
        apiSecretKeySecretName: {{ .Values.airflow.apiSecretKeySecretName | quote }}
        jwtSecretName: {{ .Values.airflow.jwtSecretName | quote }}
        # Airflow 3.x exposes the UI through the API server ingress
        ingress:
          apiServer:
            enabled: true
            ingressClassName: traefik
            hosts:
              - name: {{ .Values.airflow.ingress.host | quote }}
                tls:
                  enabled: true
                  secretName: airflow-tls
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.airflow.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
