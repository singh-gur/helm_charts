# Airflow DAG gitSync HTTPS Credentials
# Used by dags.gitSync.credentialsSecret in the Airflow Helm chart.
# The chart reads both legacy git-sync v3 keys and git-sync v4 keys, so keep all four.
#
# Create with kubectl:
#   kubectl create secret generic airflow-dags-git-credentials \
#     --from-literal=GITSYNC_USERNAME="YOUR_GIT_USERNAME" \
#     --from-literal=GITSYNC_PASSWORD="YOUR_GIT_TOKEN" \
#     --from-literal=GIT_SYNC_USERNAME="YOUR_GIT_USERNAME" \
#     --from-literal=GIT_SYNC_PASSWORD="YOUR_GIT_TOKEN" \
#     --namespace airflow
#
# To update an existing secret:
#   kubectl create secret generic airflow-dags-git-credentials \
#     --from-literal=GITSYNC_USERNAME="YOUR_GIT_USERNAME" \
#     --from-literal=GITSYNC_PASSWORD="YOUR_GIT_TOKEN" \
#     --from-literal=GIT_SYNC_USERNAME="YOUR_GIT_USERNAME" \
#     --from-literal=GIT_SYNC_PASSWORD="YOUR_GIT_TOKEN" \
#     --namespace airflow \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Or apply this file after replacing YOUR_GIT_USERNAME and YOUR_GIT_TOKEN:
#   kubectl apply -f samples/airflow-dags-git-credentials.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: airflow-dags-git-credentials
  namespace: airflow
  labels:
    app.kubernetes.io/name: airflow
type: Opaque
stringData:
  GITSYNC_USERNAME: YOUR_GIT_USERNAME
  GITSYNC_PASSWORD: YOUR_GIT_TOKEN
  GIT_SYNC_USERNAME: YOUR_GIT_USERNAME
  GIT_SYNC_PASSWORD: YOUR_GIT_TOKEN
