# Airflow 3.x API Secret Key Secret
# Used to sign JWT tokens issued by the Airflow API server.
# The official chart reads this via apiSecretKeySecretName.
#
# Generate a random secret key:
#   openssl rand -hex 32
#   # or
#   python3 -c "import secrets; print(secrets.token_hex(32))"
#
# Create with kubectl:
#   kubectl create secret generic airflow-api-secret-key \
#     --from-literal=api-secret-key="API_SECRET_KEY_HERE" \
#     --namespace airflow
---
apiVersion: v1
kind: Secret
metadata:
  name: airflow-api-secret-key
  namespace: airflow
  labels:
    app.kubernetes.io/name: airflow
type: Opaque
stringData:
  api-secret-key: API_SECRET_KEY_HERE
