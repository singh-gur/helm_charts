# Airflow Fernet Key Secret
# Used to encrypt connection passwords and variables stored in the metadata DB.
# The official chart reads this via fernetKeySecretName.
#
# Generate a valid Fernet key (requires the cryptography Python package):
#   python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#
# Alternatively with pip in a temporary venv:
#   python3 -m venv /tmp/fernet-venv && source /tmp/fernet-venv/bin/activate
#   pip install cryptography
#   python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#
# Create with kubectl:
#   kubectl create secret generic airflow-fernet-key \
#     --from-literal=fernet-key="FERNET_KEY_HERE" \
#     --namespace airflow
---
apiVersion: v1
kind: Secret
metadata:
  name: airflow-fernet-key
  namespace: airflow
  labels:
    app.kubernetes.io/name: airflow
type: Opaque
stringData:
  fernet-key: FERNET_KEY_HERE
