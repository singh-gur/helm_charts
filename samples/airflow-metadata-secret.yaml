# Airflow Metadata DB Secret
# Provides the SQLAlchemy connection string for the Airflow metadata database.
# The official chart reads this secret via data.metadataSecretName.
#
# Prerequisites:
#   1. Create PostgreSQL database and user on your external server:
#      CREATE USER airflow WITH PASSWORD 'your-secure-password';
#      CREATE DATABASE airflow OWNER airflow;
#      \c airflow
#      GRANT ALL ON SCHEMA public TO airflow;
#
#   2. Create this secret before the first ArgoCD sync.
#
# Generate a random password (example):
#   openssl rand -base64 32
#
# Create with kubectl:
#   kubectl create secret generic airflow-metadata \
#     --from-literal=connection="postgresql+psycopg2://airflow:PASSWORD_HERE@192.168.2.119:5432/airflow" \
#     --namespace airflow
#
# Or apply this file after replacing PASSWORD_HERE:
#   kubectl apply -f samples/airflow-metadata-secret.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: airflow-metadata
  namespace: airflow
  labels:
    app.kubernetes.io/name: airflow
type: Opaque
stringData:
  connection: postgresql+psycopg2://airflow:PASSWORD_HERE@192.168.2.119:5432/airflow
