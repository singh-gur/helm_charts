# Loki S3 credentials
#
# Update the placeholder values, then apply with:
#   kubectl apply -f samples/loki-s3-credentials.yaml
#
# These keys are consumed by the lgtm Loki chart via extraEnvFrom and
# expanded in config with -config.expand-env=true.
---
apiVersion: v1
kind: Secret
metadata:
  name: loki-s3-credentials
  namespace: default
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/instance: lgtm
    app.kubernetes.io/component: object-storage
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "YOUR_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "YOUR_SECRET_KEY"
  S3_ENDPOINT: "s3.gsingh.io"
  S3_REGION: "us-east-1"
  S3_BUCKET: "loki"
