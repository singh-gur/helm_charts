# Airflow Redis Password Secret
# Referenced by airflow.redisPasswordSecretName in charts/root-app/values.yaml.
# Without this, the chart auto-generates airflow-redis-password as a helm hook,
# which ArgoCD never runs — syncs hang on:
#   waiting for completion of hook /Secret/airflow-redis-password
#
# The password here MUST match the one embedded in the airflow-broker-url secret:
#   redis://:YOUR_REDIS_PASSWORD@airflow-redis:6379/0
#
# Create with kubectl:
#   kubectl create secret generic airflow-redis-credentials \
#     --from-literal=password="YOUR_REDIS_PASSWORD" \
#     --namespace airflow
#
# The secret key MUST be "password".
---
apiVersion: v1
kind: Secret
metadata:
  name: airflow-redis-credentials
  namespace: airflow
  labels:
    app.kubernetes.io/name: airflow
type: Opaque
stringData:
  password: YOUR_REDIS_PASSWORD
