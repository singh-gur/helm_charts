# Airflow 3.x JWT Secret
# Used by the Airflow API server to verify JWT tokens.
# The official chart reads this via jwtSecretName.
#
# Generate a random secret:
#   openssl rand -hex 32
#   # or
#   python3 -c "import secrets; print(secrets.token_hex(32))"
#
# Create with kubectl:
#   kubectl create secret generic airflow-jwt-secret \
#     --from-literal=jwt-secret="JWT_SECRET_HERE" \
#     --namespace airflow
---
apiVersion: v1
kind: Secret
metadata:
  name: airflow-jwt-secret
  namespace: airflow
  labels:
    app.kubernetes.io/name: airflow
type: Opaque
stringData:
  jwt-secret: JWT_SECRET_HERE
