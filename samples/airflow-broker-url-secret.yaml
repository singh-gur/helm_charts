# Airflow Celery Broker URL Secret
# Required when using CeleryExecutor (the default). The chart normally auto-generates
# this secret on first `helm install`, but it is NOT recreated by `helm upgrade` (which
# is what ArgoCD uses). If the secret is ever deleted, pods crash with:
#   Error: secret "airflow-broker-url" not found
#
# Redis password is set via redisPasswordSecretName (see airflow-redis-credentials.yaml).
# The password embedded here MUST match that secret's "password" key:
#   redis://:YOUR_REDIS_PASSWORD@airflow-redis:6379/0
#
# Create with kubectl:
#   kubectl create secret generic airflow-broker-url \
#     --from-literal=connection="redis://:YOUR_REDIS_PASSWORD@airflow-redis:6379/0" \
#     --namespace airflow
#
# The secret key MUST be "connection".
---
apiVersion: v1
kind: Secret
metadata:
  name: airflow-broker-url
  namespace: airflow
  labels:
    app.kubernetes.io/name: airflow
type: Opaque
stringData:
  connection: redis://:YOUR_REDIS_PASSWORD@airflow-redis:6379/0
