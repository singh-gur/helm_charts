# Airflow Admin User Credentials
# Password for the initial admin user created by createUserJob on first deploy.
# The createUserJob reads the password via AIRFLOW_ADMIN_PASSWORD env var injected
# from this secret, so no plaintext password appears in values.yaml or git.
#
# Generate a strong password:
#   openssl rand -base64 24
#
# Create with kubectl:
#   kubectl create secret generic airflow-admin-credentials \
#     --from-literal=password="YOUR_ADMIN_PASSWORD_HERE" \
#     --namespace airflow
#
# To update an existing secret (note: changing password here does NOT retroactively
# update the Airflow DB — use the Airflow UI or CLI to change existing user passwords):
#   kubectl create secret generic airflow-admin-credentials \
#     --from-literal=password="YOUR_ADMIN_PASSWORD_HERE" \
#     --namespace airflow \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# IMPORTANT: Create this secret BEFORE the first ArgoCD sync, or the createUserJob
# will fail to start (missing secret reference).
---
apiVersion: v1
kind: Secret
metadata:
  name: airflow-admin-credentials
  namespace: airflow
  labels:
    app.kubernetes.io/name: airflow
type: Opaque
stringData:
  password: PASSWORD_HERE
